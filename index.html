<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Formulário HTML e CSS</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #ffeef2;
            margin: 0;
            padding: 20px;
        }

        form {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border: 1px solid #f8bbd0;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            color: #d81b60;
            margin-top: 0;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 600;
            color: #880e4f;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #f48fb1;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="text"]:focus, 
        input[type="email"]:focus, 
        input[type="password"]:focus, 
        input[type="date"]:focus, 
        select:focus, 
        textarea:focus {
            background-color: #fff0f3;
            border-color: #d81b60;
        }

        .opcoes-grupo label {
            display: inline;
            font-weight: normal;
            color: #555;
            margin-right: 15px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ec407a;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>

    <form action="#" method="POST">
        <h2>Cadastro</h2>
        
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

        <label for="nascimento">Data de Nascimento:</label>
        <input type="date" id="nascimento" name="nascimento" required>

        <label for="curso">Curso:</label>
        <select id="curso" name="curso" required>
            <option value="">Selecione um curso</option>
            <option value="informatica">Engenharia de Software</option>
            <option value="administracao">Moda</option>
            <option value="enfermagem">Letras</option>
        </select>

        <label>Sexo:</label>
        <div class="opcoes-grupo">
            <label><input type="radio" name="sexo" value="masculino" required> Masculino</label>
            <label><input type="radio" name="sexo" value="feminino"> Feminino</label>
            <label><input type="radio" name="sexo" value="outro"> Outro</label>
        </div>

        <label>Interesses:</label>
        <div class="opcoes-grupo">
            <label><input type="checkbox" name="interesses" value="tecnologia"> Tecnologia</label>
            <label><input type="checkbox" name="interesses" value="literatura"> Literature</label>
            <label><input type="checkbox" name="interesses" value="moda"> Moda</label>
        </div>

        <label for="comentarios">Comentários:</label>
        <textarea id="comentarios" name="comentarios" placeholder="Deixe seu comentário..."></textarea>

        <label for="foto">Upload de foto:</label>
        <input type="file" id="foto" name="foto" accept="image/*">

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
